kind = "web"
previewPath = "/"
title = "Sahil & Meenu — A Proposal"
version = "1.0.0"
id = "artifacts/proposal"
router = "path"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 18873

[services.development]
run = "pnpm --filter @workspace/proposal run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/proposal", "run", "build" ]
serve = "static"
publicDir = "artifacts/proposal/dist/public"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "18873"
BASE_PATH = "/"
